name: Destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: Destroy
    if: |
      github.repository == 'mohamed-ahmed-58059/hf-ml-platform.auth' &&
      github.actor == 'mohamed-ahmed-58059'
    environment: production
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK dependencies
        working-directory: infra
        run: pip install -r requirements.txt

      - name: Destroy ECS stack
        working-directory: infra
        run: cdk destroy HfMlPlatformAuthEcsStack --force

      - name: Destroy ECR stack
        working-directory: infra
        run: cdk destroy HfMlPlatformAuthEcrStack --force
